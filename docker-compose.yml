version: '3'

services:
  nocobase:
    image: nocobase/nocobase:latest # Or build from source if desired, but image works if envs match
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - APP_ENV=production
      - DB_DIALECT=postgres
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_DATABASE=nocobase
      - DB_USER=nocobase
      - DB_PASSWORD=nocobase
      - INIT_ROOT_EMAIL=admin@investwith.art
      - INIT_ROOT_PASSWORD=nocobase-art-admin123!
      - INIT_ROOT_NICKNAME=Super Admin
      - INIT_ROOT_USERNAME=admin
    ports:
      - "127.0.0.1:13000:80"
    volumes:
      - /space/nocobase/storage:/app/nocobase/storage
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: nocobase
      POSTGRES_PASSWORD: nocobase
      POSTGRES_DB: nocobase
    volumes:
      - /space/nocobase/pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nocobase"]
      interval: 10s
      timeout: 5s
      retries: 5
    command: postgres -c log_statement=none

